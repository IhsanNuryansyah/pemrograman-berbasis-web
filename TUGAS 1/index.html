<!doctype html>
<html lang="id">
  <head>
    <meta name="author" content="Ihsan Nuryansyah" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | SITTA</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>

  <body class="login-body">
    <div class="login-container">
      <!-- Logo SITTA -->
      <div class="logo-wrapper">
        <img src="img/logo_ut.png" alt="Logo SITTA" class="logo-sitta-login" />
      </div>

      <h2>SITTA - Sistem Informasi Tracking & Transaksi Ajar</h2>

      <form id="loginForm" class="loginForm">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Masukkan email" required />

        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          placeholder="Masukkan password"
          required
        />

        <button type="submit" class="btn-login">Login</button>

        <div class="login-options">
          <a href="#" id="forgotPassword">Lupa Password?</a>
          <a href="#" id="register">Daftar</a>
        </div>
      </form>
    </div>
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
  </body>
  <div id="footer"></div>
</html>
