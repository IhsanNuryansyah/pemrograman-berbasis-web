<!doctype html>
<html lang="id">
  <head>
    <meta name="author" content="Ihsan Nuryansyah" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tracking Pengiriman | SITTA</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>
  <body class="tracking-body">
    <div class="tracking-container">
      <h1><i class="fas fa-truck"></i> Tracking Pengiriman</h1>

      <div class="tracking-form">
        <input
          type="text"
          id="inputDO"
          placeholder="Masukkan Nomor Delivery Order (DO)"
        />
        <button onclick="cariDO()">Cari</button>
      </div>

      <div id="trackingResult" class="tracking-result"></div>

      <button
        class="back-btn"
        onclick="window.location.href = 'dashboard.html'"
      >
        <i class="fa-arrow-left fas"></i> Kembali ke Dashboard
      </button>
    </div>

    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
  </body>
  <div id="footer"></div>
</html>
