<!DOCTYPE html>
<html lang="id">
  <head>
    <meta name="author" content="Ihsan Nuryansyah" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | SITTA</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>

  <body class="dashboard-body">
    <div class="dashboard-container">
      <header class="dashboard-header">
        <div class="header-left">
          <img src="img/logo_ut.png" alt="Logo SITTA" class="logo-sitta" />
          <h1 id="greeting">Selamat datang!</h1>
        </div>
        <button id="logoutBtn" class="btn-logout">Logout</button>
      </header>

      <main>
        <h2>Menu Utama</h2>

        <div class="menu-grid">
          <div class="menu-card" id="stockBtn" >
            <i class="fas fa-book"></i> <br />
            <span>Informasi Bahan Ajar</span>
          </div>

          <div class="menu-card" id="trackingBtn">
            <i class="fas fa-truck"></i> <br />
            <span>Tracking Pengiriman</span>
          </div>

          <div class="menu-card" id="laporanBtn">
            <i class="fas fa-chart-line"></i> <br />
            <span>Laporan</span>
          </div>

          <div class="menu-card" id="historiBtn">
            <i class="fa-clock-rotate-left fas"></i> <br />
            <span>Histori Transaksi</span>
          </div>
        </div>
      </main>
    </div>

    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
  </body>
  <div id="footer"></div>

  </script>
</html>
